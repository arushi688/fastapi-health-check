name: FastAPI Health Check

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  actions: write

jobs:
  test-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build FastAPI Docker image
        run: cd health_check && docker build --build-arg ENVIRONMENT=dev -t fastapi-health:dev .

      - name: Start FastAPI container
        run: |
          docker run -d -p 8000:8000 --name fastapi-app fastapi-health:dev
          sleep 5

      - name: Build Test Runner
        run: docker build -t test-runner ./test_runner

      - name: Run Test Runner
        run: docker run --network host test-runner

      - name: Stop container
        if: always()
        run: |
          docker stop fastapi-app
          docker rm fastapi-app

  promote-to-qa:
    needs: test-health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Promote develop to qa
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git fetch origin
          git checkout qa

          git reset --hard origin/develop

          git push origin qa --force

      - name: Trigger QA workflow
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/qa-health-check.yml/dispatches \
          -d '{"ref":"qa"}'
