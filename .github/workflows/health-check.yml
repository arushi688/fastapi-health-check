name: FastAPI Health Check

on:
  push:
    branches:
      - develop

jobs:
  test-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build FastAPI Docker image
        run: cd health_check && docker build --build-arg ENVIRONMENT=dev -t fastapi-health:dev .

      - name: Start FastAPI container
        run: |
          docker run -d -p 8000:8000 --name fastapi-app fastapi-health:dev
          sleep 5

      - name: Build Test Runner
        run: docker build -t test-runner ./test_runner

      - name: Run Test Runner
        run: docker run --network host test-runner

      - name: Stop container
        if: always()
        run: |
          docker stop fastapi-app
          docker rm fastapi-app
