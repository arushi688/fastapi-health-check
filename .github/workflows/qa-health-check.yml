name: FastAPI QA Health Check

on:
  push:
    branches:
      - qa

jobs:
  test-health-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build FastAPI Docker image (QA)
        run: cd health_check && docker build --build-arg ENVIRONMENT=qa -t fastapi-health:qa .

      - name: Start FastAPI container (QA)
        run: |
          docker run -d -p 8000:8000 --name fastapi-app fastapi-health:qa
          sleep 5

      - name: Build Test Runner
        run: docker build -t test-runner ./test_runner

      - name: Run Test Runner
        run: docker run --network host test-runner

      - name: Stop container
        if: always()
        run: |
          docker stop fastapi-app
          docker rm fastapi-app

  manual-approval:
    needs: test-health-qa
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Await approval
        run: echo "Release approved. Proceeding to production."

  deploy-production:
    needs: manual-approval
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        run: echo "Deploying to production..."
